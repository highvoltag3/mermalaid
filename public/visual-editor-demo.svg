<rect x="68.02" y="244.2" width="33.16" height="27" rx="4" ry="4" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="0.5"></rect>
<text x="84.6" y="257.7" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Yes</text>
<rect x="184.07999999999998" y="244.2" width="27.44" height="27" rx="4" ry="4" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="0.5"></rect>
<text x="197.79999999999998" y="257.7" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">No</text>
<polygon points="141.2,116 197.79999999999998,172.6 141.2,229.2 84.6,172.6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75"></polygon>
