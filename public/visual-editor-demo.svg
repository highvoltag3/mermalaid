<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 282.4 438.2" width="282.4" height="438.2" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 30%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto">
    <polygon points="0 0, 8 2.4, 0 4.8" fill="var(--_arrow)"></polygon>
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="4.8" refX="0" refY="2.4" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.4, 8 4.8" fill="var(--_arrow)"></polygon>
  </marker>
</defs>
<polyline points="141.2,76 141.2,115.99999999999999" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)"></polyline>
<polyline points="118.59195483415665,206.59195483415667 118.59195483415665,257.7 84.6,257.7 84.6,286.2" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)"></polyline>
<polyline points="163.8080451658433,206.59195483415667 163.8080451658433,257.7 197.79999999999998,257.7 197.79999999999998,286.2" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)"></polyline>
<polyline points="84.6,322.2 84.6,380.2 111.19999999999999,380.2" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)"></polyline>
