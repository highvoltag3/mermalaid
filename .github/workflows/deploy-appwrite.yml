name: Deploy to Appwrite Sites

on:
  push:
    branches:
      - main
      - feature/appwrite-sites
  workflow_dispatch:

concurrency:
  group: appwrite-sites-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html missing after npm run build"
            exit 1
          fi
          echo "Build output size:"
          du -sh dist

      # Sites REST API (no Appwrite CLI): https://appwrite.io/docs/references/cloud/server-rest/sites#createDeployment
      - name: Deploy to Appwrite Sites
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_SITE_ID: ${{ secrets.APPWRITE_SITE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APPWRITE_ENDPOINT}" ]; then
            echo "::error::Set APPWRITE_ENDPOINT secret to your project region endpoint, e.g. https://<REGION>.cloud.appwrite.io/v1"
            exit 1
          fi
          if [ -z "${APPWRITE_PROJECT_ID}" ] || [ -z "${APPWRITE_API_KEY}" ]; then
            echo "::error::Set APPWRITE_PROJECT_ID and APPWRITE_API_KEY repository secrets."
            exit 1
          fi
          if [ -z "${APPWRITE_SITE_ID}" ]; then
            echo "::error::Set APPWRITE_SITE_ID repository secret (Sites → your site → Settings)."
            exit 1
          fi
          EP="${APPWRITE_ENDPOINT%/}"
          if [ "${EP}" = "https://cloud.appwrite.io/v1" ] || [ "${EP}" = "https://cloud.appwrite.io" ]; then
            echo "::error::APPWRITE_ENDPOINT must include your region host, e.g. https://<REGION>.cloud.appwrite.io/v1"
            exit 1
          fi
          tar -czf site-code.tar.gz -C dist .
          ls -lh site-code.tar.gz
          HTTP_CODE=$(curl -sS -o deploy-response.json -w "%{http_code}" \
            -X POST "${EP}/sites/${APPWRITE_SITE_ID}/deployments" \
            -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" \
            -H "X-Appwrite-Key: ${APPWRITE_API_KEY}" \
            -F "code=@site-code.tar.gz" \
            -F "activate=true")
          if [ "${HTTP_CODE}" != "202" ] && [ "${HTTP_CODE}" != "201" ]; then
            echo "::error::Appwrite returned HTTP ${HTTP_CODE}"
            cat deploy-response.json
            exit 1
          fi
          echo "Deployment accepted (HTTP ${HTTP_CODE}):"
          cat deploy-response.json

      - name: Deployment Status
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Your site should be available shortly"
