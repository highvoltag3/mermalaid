name: Deploy to Appwrite Sites

on:
  push:
    branches:
      - main
      - feature/appwrite-sites
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # setup-for-appwrite@v1 calls `appwrite init --locale=...`, which CLI v16+ rejects.
      # Use `appwrite client` for CI: https://appwrite.io/docs/tooling/command-line/non-interactive
      - name: Install Appwrite CLI
        run: curl -sL https://appwrite.io/cli/install.sh | bash

      - name: Configure Appwrite CLI (non-interactive)
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT || 'https://cloud.appwrite.io/v1' }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          EP="${APPWRITE_ENDPOINT%/}"
          appwrite client \
            --endpoint "${EP}" \
            --project-id "${APPWRITE_PROJECT_ID}" \
            --key "${APPWRITE_API_KEY}"
          appwrite version

      - name: Deploy to Appwrite Sites
        run: |
          appwrite deploy sites \
            --siteId ${{ secrets.APPWRITE_SITE_ID }} \
            --entrypoint dist/index.html \
            --output dist

      - name: Deployment Status
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Your site should be available shortly"
