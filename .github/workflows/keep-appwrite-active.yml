name: keep-appwrite-active

on:
  schedule:
    - cron: "0 2 */5 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Appwrite health
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
        run: |
          BASE="${APPWRITE_ENDPOINT:-https://cloud.appwrite.io/v1}"
          BASE="${BASE%/}"
          curl -sf "${BASE}/health" || exit 1
